name: Build genmon addon

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - 'genmon/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64, armv7]
        include:
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-debian:latest
            platform: linux/arm64
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-debian:latest
            platform: linux/amd64
          - arch: armv7
            base: ghcr.io/home-assistant/armv7-base-debian:latest
            platform: linux/arm/v7

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get genmon version
        id: version
        run: |
          TAG=$(grep -oP '(?<=tags/)[^/]+(?=\.tar\.gz)' genmon/Dockerfile)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./genmon
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=${{ matrix.base }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/genmon-addon:${{ matrix.arch }}-latest
            ghcr.io/${{ github.repository_owner }}/genmon-addon:${{ matrix.arch }}-${{ steps.version.outputs.tag }}
