name: PowerTop Plus
version: "1.0.0"
slug: powertop_plus
description: "Intel PowerTop power management analysis and auto-tuning addon"
url: "https://github.com/nathanpotter/ha-addons"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
host_network: true
host_pid: true
devices:
  - /dev/cpu_dma_latency
  - /dev/snapshot
  - /proc/cpuinfo
  - /proc/interrupts
  - /proc/stat
options:
  auto_tune: true
  report_interval: 300
  web_port: 8080
schema:
  auto_tune: bool
  report_interval: int(60,3600)?
  web_port: port
ports:
  8080/tcp: 8080
image: "ghcr.io/nathanpotter/powertop-plus-{arch}"