name: PowerTop
version: "0.1.0"
slug: powertop
description: "Intel PowerTop power management analysis and auto-tuning addon"
url: "https://github.com/nathanpotter/ha-addons"
arch:
  - amd64
  - i386
init: false
hassio_api: true
hassio_role: default
full_access: true
kernel_modules: true
udev: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO
  - SYS_MODULE
  - IPC_LOCK
host_network: true
host_pid: true
apparmor: false
devices:
  - /dev/mem 
  - /dev/cpu_dma_latency
  - /dev/snapshot
  - /proc/cpuinfo
  - /proc/interrupts
  - /proc/stat
  - /sys/kernel/debug
ingress: true
ingress_port: 8080
options:
  auto_tune: true
  report_interval: 300
  web_port: 8080
schema:
  auto_tune: bool?
  report_interval: int(60,3600)?
  web_port: port?
ports:
  8080/tcp: 8080